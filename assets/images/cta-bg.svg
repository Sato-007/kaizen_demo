<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Abstract Geometric Patterns (Light Theme) -->
    
    <!-- Large structural curves in subtle brand colors -->
    <path d="M-100 400C200 100 500 200 800 50C1000 -50 1300 150 1400 100" stroke="#64FFDA" stroke-width="2" opacity="0.3" fill="none"/>
    <path d="M0 450C300 150 600 250 900 100C1100 0 1400 200 1500 150" stroke="#0A192F" stroke-width="1" opacity="0.1" fill="none"/>
    
    <g opacity="0.4">
        <!-- Connecting Nodes -->
        <circle cx="200" cy="225" r="4" fill="#64FFDA"/>
        <circle cx="200" cy="225" r="12" stroke="#64FFDA" stroke-width="1" fill="none"/>
        <line x1="200" y1="225" x2="350" y2="150" stroke="#0A192F" stroke-width="0.5" opacity="0.2"/>
        
        <circle cx="350" cy="150" r="3" fill="#0A192F" opacity="0.5"/>
        
        <circle cx="800" cy="50" r="5" fill="#64FFDA"/>
        <circle cx="800" cy="50" r="16" stroke="#64FFDA" stroke-width="0.5" fill="none"/>
        <line x1="800" y1="50" x2="950" y2="250" stroke="#0A192F" stroke-width="0.5" opacity="0.2"/>
        
        <circle cx="950" cy="250" r="3" fill="#0A192F" opacity="0.5"/>
        <line x1="950" y1="250" x2="1100" y2="200" stroke="#0A192F" stroke-width="0.5" opacity="0.2"/>
        
        <circle cx="1100" cy="200" r="6" fill="#64FFDA"/>
    </g>

    <!-- Subtle Grid Background -->
    <g opacity="0.05">
        <path d="M100 0V400 M200 0V400 M300 0V400 M400 0V400 M500 0V400 M600 0V400 M700 0V400 M800 0V400 M900 0V400 M1000 0V400 M1100 0V400" stroke="#0A192F" stroke-width="1"/>
        <path d="M0 100H1200 M0 200H1200 M0 300H1200" stroke="#0A192F" stroke-width="1"/>
    </g>
    
    <!-- Accent Decorative Elements -->
    <rect x="50" y="300" width="40" height="40" stroke="#64FFDA" stroke-width="1" opacity="0.5" fill="none"/>
    <rect x="55" y="305" width="30" height="30" stroke="#0A192F" stroke-width="0.5" opacity="0.2" fill="none"/>
    
    <rect x="1050" y="50" width="80" height="80" stroke="#64FFDA" stroke-width="0.5" opacity="0.3" fill="none" transform="rotate(15 1090 90)"/>
</svg>